name: spy_android
description: "Consent-based guardian location sharing application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.3.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  geolocator: ^10.1.1
  permission_handler: ^11.4.0
  workmanager: ^0.5.2

  path_provider: ^2.1.5

  shared_preferences: ^2.5.3

  device_info_plus: ^10.1.2
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
